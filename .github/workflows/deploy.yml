name: Textile Billing — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Job 1: Test backend ─────────────────────────────────────────────────────
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: node --check server.js routes/auth.js routes/invoices.js routes/other.js services/pdfService.js services/emailService.js

  # ─── Job 2: Build frontend ────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── Job 3: Deploy to AWS EC2 (only on push to main) ─────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /home/ubuntu/textile-billing

            # Pull latest code
            git pull origin main

            # Backend
            cd backend
            npm ci --omit=dev
            # Restart with PM2
            pm2 restart textile-backend --update-env || pm2 start server.js --name textile-backend
            cd ..

            # Frontend — copy built files to Nginx web root
            sudo cp -r frontend/dist/* /var/www/textile-billing/
            sudo chown -R www-data:www-data /var/www/textile-billing/

            echo "✅ Deployment complete!"
            pm2 status

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Deployed commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
