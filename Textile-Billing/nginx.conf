# Nginx configuration for Textile Billing System
# Place this file at: /etc/nginx/sites-available/textile-billing
# Then: sudo ln -s /etc/nginx/sites-available/textile-billing /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_EC2_IP;   # ← Replace with your domain or EC2 public IP

    # Redirect HTTP to HTTPS (uncomment after setting up SSL with certbot)
    # return 301 https://$host$request_uri;

    # ── Frontend — React app ──────────────────────────────────────────────────
    root /var/www/textile-billing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback for React Router
    }

    # ── Backend API — proxy to Express on port 5000 ───────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout for PDF generation (can take a few seconds)
        proxy_read_timeout 60s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

